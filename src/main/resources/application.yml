# =====================================================
# 集团统计报表平台 - 应用配置
# GroupReportPlatform Application Configuration
# =====================================================

server:
  port: 8083
  servlet:
    context-path: /

spring:
  application:
    name: group-report-platform

  # Knife4j / OpenAPI 文档配置
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher  # 使用 Ant 风格路径匹配，避免正则冲突

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://172.22.72.176:3306/group_report_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: test_user
    password: TestUser@123456

  # Redis配置
  data:
    redis:
      host: 172.22.72.176
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.groupreport.platform.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-prefix: ""
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Sa-Token配置
sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
  is-read-header: true
  is-read-cookie: false

# Knife4j接口文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.groupreport.platform.controller

knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表

# 日志配置
logging:
  level:
    root: info
    com.groupreport.platform: debug
    com.baomidou.mybatisplus: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/group-report-platform.log
    max-size: 100MB
    max-history: 30

# 自定义应用配置
app:
  # 超级管理员账号
  super-admin:
    username: admin
    password: admin123

  # 报表配置
  report:
    # 数据保留天数
    data-retention-days: 365
    # 最大提交次数
    max-submit-count: 10
    # 是否启用审核流程
    audit-enabled: true
